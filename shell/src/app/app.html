<div class="sidebar-overlay" [class.visible]="isOpen" (click)="closeSidebar()"></div>

<div class="layout">
  <header class="navbar">
    <button
      class="menu-toggle"
      (click)="toggleSidebar()"
      [class.open]="isOpen"
      aria-label="Toggle sidebar"
    >
      <span></span><span></span><span></span>
    </button>

    AI Learning Dashboard
  </header>

  <div class="main">
    <aside class="sidebar" [class.open]="isOpen">
      <a routerLink="/data" routerLinkActive="active" (click)="closeSidebar()" data-icon="◫"
        >Data</a
      >

      <a
        routerLink="/visualization"
        routerLinkActive="active"
        [class.disabled]="!datasetExists"
        data-icon="◎"
        (click)="handleNav($event)"
        >Visualization</a
      >

      <a
        [routerLink]="datasetExists ? ['/training'] : []"
        routerLinkActive="active"
        [class.disabled]="!datasetExists"
        data-icon="⌬"
        (click)="handleNav($event)"
        >Training</a
      >

      <a
        routerLink="/prediction"
        routerLinkActive="active"
        [class.disabled]="!datasetExists"
        data-icon="◆"
        (click)="handleNav($event)"
        >Prediction</a
      >
    </aside>

    <section class="content">
      <router-outlet></router-outlet>
    </section>
  </div>
</div>
